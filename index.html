<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #272727;
    --bg4: #3f3f3f;
    --text: #f1f1f1;
    --text2: #aaaaaa;
    --text3: #717171;
    --accent: #ff0000;
    --accent2: #ff4444;
    --sidebar-w: 240px;
    --sidebar-collapsed: 72px;
    --topbar-h: 56px;
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ─── TOPBAR ─── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--topbar-h);
    background: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(12px);
  }

  #menu-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); padding: 8px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition);
    flex-shrink: 0;
  }
  #menu-btn:hover { background: var(--bg3); }
  #menu-btn svg { width:24px; height:24px; }

  #logo {
    display: flex; align-items: center; gap: 6px;
    text-decoration: none; flex-shrink: 0;
    margin-inline-end: 8px;
  }
  #logo .logo-icon {
    background: var(--accent);
    border-radius: 8px;
    width: 34px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--transition);
  }
  #logo:hover .logo-icon { transform: scale(1.08); }
  #logo .logo-icon svg { width:16px; height:16px; fill:white; }
  #logo span {
    font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }
  #logo .logo-sub { font-size: 10px; color: var(--text3); font-weight: 400; margin-top: 2px; }

  /* Search */
  #search-wrap {
    flex: 1; max-width: 600px;
    display: flex; align-items: center; gap: 0;
    margin: 0 auto;
  }
  #search-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--bg4);
    border-radius: 24px 0 0 24px;
    padding: 8px 18px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Rubik', sans-serif;
    outline: none;
    transition: border-color var(--transition);
    direction: rtl;
  }
  #search-input:focus { border-color: #3ea6ff; }
  #search-input::placeholder { color: var(--text3); }
  #search-btn {
    background: var(--bg3);
    border: 1px solid var(--bg4);
    border-left: none;
    border-radius: 0 24px 24px 0;
    padding: 8px 18px;
    cursor: pointer;
    color: var(--text);
    transition: background var(--transition);
    display: flex; align-items: center;
  }
  #search-btn:hover { background: var(--bg4); }
  #search-btn svg { width:20px; height:20px; }

  .topbar-actions {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0; margin-inline-start: auto;
  }
  .topbar-icon-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text); padding: 8px; border-radius: 50%;
    display: flex; align-items: center;
    transition: background var(--transition);
    position: relative;
  }
  .topbar-icon-btn:hover { background: var(--bg3); }
  .topbar-icon-btn svg { width:22px; height:22px; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; cursor: pointer;
    transition: opacity var(--transition);
    flex-shrink: 0;
  }
  .avatar:hover { opacity: 0.85; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    position: fixed;
    top: var(--topbar-h);
    right: 0;
    width: var(--sidebar-w);
    height: calc(100vh - var(--topbar-h));
    background: var(--bg);
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 0;
    z-index: 90;
    transition: width var(--transition), transform var(--transition);
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
  }
  #sidebar.collapsed { width: var(--sidebar-collapsed); }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .sidebar-section { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 4px; }
  .sidebar-section:last-child { border-bottom: none; }
  .sidebar-section-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 4px 20px 8px;
    white-space: nowrap; overflow: hidden;
    transition: opacity var(--transition);
  }
  #sidebar.collapsed .sidebar-section-label { opacity: 0; }

  .nav-item {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 20px;
    cursor: pointer; border-radius: 10px;
    margin: 2px 8px;
    transition: background var(--transition);
    text-decoration: none; color: var(--text);
    white-space: nowrap; overflow: hidden;
    position: relative;
  }
  .nav-item:hover { background: var(--bg3); }
  .nav-item.active { background: var(--bg3); font-weight: 500; }
  .nav-item.active svg { color: var(--accent); }
  .nav-item svg { width:22px; height:22px; flex-shrink: 0; }
  .nav-item span { font-size: 14px; opacity: 1; transition: opacity var(--transition); }
  #sidebar.collapsed .nav-item span { opacity: 0; }
  #sidebar.collapsed .nav-item { justify-content: center; padding: 10px; }

  .channel-item {
    display: flex; align-items: center; gap: 16px;
    padding: 8px 20px;
    cursor: pointer; border-radius: 10px;
    margin: 2px 8px;
    transition: background var(--transition);
    text-decoration: none; color: var(--text);
    white-space: nowrap; overflow: hidden;
  }
  .channel-item:hover { background: var(--bg3); }
  .channel-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .channel-item span { font-size: 13px; }
  #sidebar.collapsed .channel-item span { opacity: 0; }

  /* ─── MAIN CONTENT ─── */
  #main {
    margin-top: var(--topbar-h);
    margin-inline-end: var(--sidebar-w);
    padding: 20px 24px;
    transition: margin var(--transition);
    min-height: calc(100vh - var(--topbar-h));
  }
  #main.sidebar-collapsed { margin-inline-end: var(--sidebar-collapsed); }

  /* Category chips */
  #chips-bar {
    display: flex; gap: 10px;
    overflow-x: auto; padding-bottom: 8px;
    margin-bottom: 24px;
    scrollbar-width: none;
    flex-wrap: nowrap;
    direction: ltr;
  }
  #chips-bar::-webkit-scrollbar { display: none; }
  .chip {
    background: var(--text);
    color: var(--bg);
    border: none; border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background var(--transition), color var(--transition), transform 0.1s;
    font-family: 'Rubik', sans-serif;
  }
  .chip:not(.active) {
    background: var(--bg3);
    color: var(--text);
  }
  .chip:hover:not(.active) { background: var(--bg4); transform: translateY(-1px); }
  .chip.active { background: var(--text); color: var(--bg); }

  /* Section */
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .section-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .section-see-all {
    font-size: 13px; color: #3ea6ff; cursor: pointer;
    text-decoration: none; font-weight: 500;
    transition: opacity var(--transition);
  }
  .section-see-all:hover { opacity: 0.7; }

  /* Video grid */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px 16px;
  }
  .video-grid.horizontal {
    display: flex; gap: 16px; overflow-x: auto;
    padding-bottom: 8px; scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .video-grid.horizontal::-webkit-scrollbar { display: none; }
  .video-grid.horizontal .video-card { min-width: 280px; max-width: 280px; }

  /* Video card */
  .video-card {
    cursor: pointer;
    transition: transform var(--transition);
    animation: fadeUp 0.4s both;
  }
  .video-card:hover { transform: translateY(-3px); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }

  .thumbnail-wrap {
    position: relative; border-radius: var(--radius);
    overflow: hidden; background: var(--bg3);
    aspect-ratio: 16/9;
  }
  .thumbnail-wrap img {
    width:100%; height:100%; object-fit:cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .video-card:hover .thumbnail-wrap img { transform: scale(1.04); }

  .duration-badge {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.85);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    font-variant-numeric: tabular-nums;
  }

  .hover-preview {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity var(--transition);
  }
  .video-card:hover .hover-preview { opacity: 1; }
  .play-btn-overlay {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transform: scale(0.8);
    transition: transform var(--transition);
  }
  .video-card:hover .play-btn-overlay { transform: scale(1); }
  .play-btn-overlay svg { width:22px; height:22px; fill:#111; margin-inline-start: 3px; }

  /* Card info */
  .card-info {
    display: flex; gap: 10px; padding: 10px 2px 4px;
    align-items: flex-start;
  }
  .card-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }
  .card-text { flex: 1; min-width: 0; }
  .card-title {
    font-size: 14px; font-weight: 500; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    color: var(--text);
    margin-bottom: 4px;
  }
  .card-channel {
    font-size: 13px; color: var(--text3);
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 2px;
  }
  .card-channel:hover { color: var(--text2); }
  .card-meta { font-size: 12px; color: var(--text3); }

  /* Skeleton loader */
  .skeleton-card .thumbnail-wrap { background: var(--bg3); }
  .skeleton-line {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 14px; margin: 6px 0;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skeleton-line.short { width: 60%; }
  .skeleton-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    flex-shrink: 0;
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin-top: 4px;
  }

  /* Error / empty state */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text3);
  }
  .empty-state .icon { font-size: 52px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text2); }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); color: var(--text);
    padding: 10px 20px; border-radius: 8px;
    font-size: 14px; z-index: 9999;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
    border: 1px solid var(--bg4);
  }
  #toast.show { opacity: 1; }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { display: none; }
    #main { margin-inline-end: 0 !important; padding: 16px; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    #search-wrap { max-width: none; }
  }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 6px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <button id="menu-btn" onclick="toggleSidebar()" title="תפריט">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

    </button>
    <div class="avatar" title="פרופיל">מ</div>

</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-section">
    <div class="nav-item active" onclick="showSection('all')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>דף הבית</span>
    </div>
    <div class="nav-item" onclick="showSection('recommended')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>

  <div class="sidebar-section">

  <div class="sidebar-section">

      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>

</div>

<!-- MAIN -->
<div id="main">
  <!-- Chips -->
  <div id="chips-bar">
    <button class="chip active" onclick="selectChip(this,'all')">הכל</button>
    <button class="chip" onclick="selectChip(this,'recommended')">מומלצים</button>
    <button class="chip" onclick="selectChip(this,'favorites')">מועדפים</button>
    <button class="chip" onclick="selectChip(this,'channels')">ערוצים</button>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="empty-state">
      <div class="icon">📺</div>
      <h3>טוען סרטונים...</h3>
      <p>אנא המתן</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────
let allData = {};         // { sectionName: [videoId, ...] }
let videoMeta = {};       // { videoId: { title, channel, thumb } }
let sidebarOpen = true;
let currentSection = 'all';
let searchQuery = '';

const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#f06595'];
const EMOJIS = { 'מומלצים':'⭐','מועדפים':'❤️','channels':'📺','ערוץ':'📡' };

// ─── INIT ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadVideosFile();
});

async function loadVideosFile() {
  try {
    const res = await fetch('videos.txt?_=' + Date.now());
    if (!res.ok) throw new Error('לא נמצא קובץ videos.txt');
    const text = await res.text();
    parseVideosFile(text);
  } catch(e) {
    showError(e.message);
  }
}

function parseVideosFile(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  let currentSection = 'כללי';
  const data = {};

  for (const line of lines) {
    if (line.startsWith('#')) {
      currentSection = line.replace(/^#+\s*/, '').trim();
      if (!data[currentSection]) data[currentSection] = [];
    } else if (line.startsWith('http')) {
      const id = extractVideoId(line);
      if (id) {
        if (!data[currentSection]) data[currentSection] = [];
        if (!data[currentSection].includes(id)) data[currentSection].push(id);
      }
    }
  }

  allData = data;
  buildSidebarChannels();
  buildChips();
  renderAll();
  fetchAllMeta();
}

function extractVideoId(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
    return u.searchParams.get('v');
  } catch { return null; }
}

// ─── META FETCH ───────────────────────────────────────────────────────────
async function fetchAllMeta() {
  const allIds = [...new Set(Object.values(allData).flat())];
  const chunks = [];
  for (let i = 0; i < allIds.length; i += 8) chunks.push(allIds.slice(i, i+8));

  for (const chunk of chunks) {
    await Promise.all(chunk.map(id => fetchVideoMeta(id)));
    renderAll(); // re-render as data arrives
  }
}

async function fetchVideoMeta(id) {
  if (videoMeta[id]) return;
  try {
    const url = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    videoMeta[id] = {
      title: data.title,
      channel: data.author_name,
      thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`
    };
  } catch {
    videoMeta[id] = {
      title: 'סרטון YouTube',
      channel: 'ערוץ לא ידוע',
      thumb: `https://img.youtube.com/vi/${id}/mqdefault.jpg`
    };
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const sections = Object.entries(allData).filter(([name, ids]) => {
    if (currentSection !== 'all') {
      const norm = normSection(name);
      if (currentSection === 'recommended' && norm !== 'recommended') return false;
      if (currentSection === 'favorites' && norm !== 'favorites') return false;
      if (currentSection === 'channels' && !name.includes('ערוץ') && !name.toLowerCase().includes('channel')) return false;
    }
    return ids.length > 0;
  });

  if (sections.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>לא נמצאו סרטונים</h3><p>נסה לחפש משהו אחר</p></div>`;
    return;
  }

  for (const [name, ids] of sections) {
    const filtered = searchQuery
      ? ids.filter(id => {
          const m = videoMeta[id];
          if (!m) return true;
          const q = searchQuery.toLowerCase();
          return m.title.toLowerCase().includes(q) || m.channel.toLowerCase().includes(q);
        })
      : ids;
    if (filtered.length === 0) continue;

    const section = renderSection(name, filtered);
    content.appendChild(section);
  }
}

function renderSection(name, ids) {
  const el = document.createElement('div');
  el.className = 'section';

  const isChannel = name.includes('ערוץ') || name.toLowerCase().includes('channel:');
  const isFav = normSection(name) === 'favorites';
  const isRec = normSection(name) === 'recommended';

  let icon = '🎬';
  if (isRec) icon = '⭐';
  else if (isFav) icon = '❤️';
  else if (isChannel) icon = '📡';

  const iconColor = COLORS[Math.abs(hashStr(name)) % COLORS.length];
  const displayName = name.replace(/^ערוץ:\s*/,'').replace(/^channel:/i,'');

  el.innerHTML = `
    <div class="section-header">
      <div class="section-title">
        <div class="section-icon" style="background:${iconColor}22; color:${iconColor}">${icon}</div>
        ${displayName}
      </div>
      ${ids.length > 4 ? `<a class="section-see-all" onclick="void(0)">הצג הכל (${ids.length})</a>` : ''}
    </div>
  `;

  const grid = document.createElement('div');
  grid.className = 'video-grid' + (ids.length > 6 ? ' horizontal' : '');

  ids.forEach((id, i) => {
    const card = renderCard(id, i * 50);
    grid.appendChild(card);
  });

  el.appendChild(grid);
  return el;
}

function renderCard(id, delay) {
  const meta = videoMeta[id];
  const card = document.createElement('div');
  card.className = 'video-card' + (meta ? '' : ' skeleton-card');
  card.style.animationDelay = delay + 'ms';
  card.onclick = () => openVideo(id);

  const color = COLORS[Math.abs(hashStr(id)) % COLORS.length];
  const initials = meta ? (meta.channel || 'Y').slice(0,2).toUpperCase() : '..';

  if (meta) {
    card.innerHTML = `
      <div class="thumbnail-wrap">
        <img src="${meta.thumb}" alt="${meta.title}" loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${id}/default.jpg'">
        <div class="hover-preview">
          <div class="play-btn-overlay">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-avatar" style="background:${color}22; color:${color}">${initials}</div>
        <div class="card-text">
          <div class="card-title">${escHtml(meta.title)}</div>
          <div class="card-channel">${escHtml(meta.channel)}</div>
          <div class="card-meta">YouTube</div>
        </div>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="thumbnail-wrap" style="aspect-ratio:16/9"></div>
      <div class="card-info">
        <div class="skeleton-avatar"></div>
        <div class="card-text">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>`;
  }
  return card;
}

function openVideo(id) {
  window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
}

// ─── SIDEBAR CHANNELS ─────────────────────────────────────────────────────
function buildSidebarChannels() {
  const container = document.getElementById('sidebar-channels');
  container.innerHTML = '';
  Object.keys(allData).forEach((name, i) => {
    const color = COLORS[i % COLORS.length];
    const initials = name.replace(/^ערוץ:\s*/,'').slice(0,2);
    const el = document.createElement('div');
    el.className = 'channel-item';
    el.innerHTML = `
      <div class="channel-avatar" style="background:${color}22; color:${color}">${initials}</div>
      <span>${name.replace(/^ערוץ:\s*/,'')}</span>`;
    el.onclick = () => {
      currentSection = 'all';
      renderAll();
      toast(`מציג: ${name}`);
    };
    container.appendChild(el);
  });
}

// ─── CHIPS ────────────────────────────────────────────────────────────────
function buildChips() {
  // keep base chips, add custom section chips
  const bar = document.getElementById('chips-bar');
  const existingBase = ['all','recommended','favorites','channels'];
  
  Object.keys(allData).forEach(name => {
    if (!['מומלצים','מועדפים'].includes(name) && !name.startsWith('ערוץ:')) {
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = name;
      btn.onclick = function() { selectChip(this, name); };
      bar.appendChild(btn);
    }
  });
}

function selectChip(el, section) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentSection = section;
  renderAll();
  // update nav active
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

// ─── SEARCH ───────────────────────────────────────────────────────────────
function filterVideos(q) {
  searchQuery = q;
  renderAll();
}

// ─── SHOW SECTION (from sidebar nav) ─────────────────────────────────────
function showSection(sec) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  currentSection = sec;
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.getAttribute('onclick')?.includes(`'${sec}'`) || (sec==='all' && c.textContent==='הכל'));
  });
  renderAll();
}

// ─── SIDEBAR TOGGLE ───────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('main').classList.toggle('sidebar-collapsed', !sidebarOpen);
}

// ─── RELOAD ───────────────────────────────────────────────────────────────
function reloadVideos() {
  allData = {}; videoMeta = {};
  document.getElementById('content').innerHTML = '<div class="empty-state"><div class="icon">🔄</div><h3>טוען מחדש...</h3></div>';
  loadVideosFile();
  toast('מרענן סרטונים...');
}

// ─── HELP ─────────────────────────────────────────────────────────────────
function showHelp() {
  toast('ערוך את videos.txt והוסף קישורי יוטיוב! כל # יוצר קטגוריה חדשה.');
}

// ─── UTILS ────────────────────────────────────────────────────────────────
function normSection(name) {
  const n = name.toLowerCase();
  if (n.includes('מומלץ') || n.includes('מומלצ') || n.includes('recommend')) return 'recommended';
  if (n.includes('מועדפ') || n.includes('favorite') || n.includes('heart')) return 'favorites';
  return 'channel';
}

function hashStr(s) {
  let h = 0;
  for (let i=0; i<s.length; i++) h = ((h<<5)-h)+s.charCodeAt(i)|0;
  return h;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="icon">⚠️</div>
      <h3>שגיאה בטעינה</h3>
      <p>${msg}</p>
      <br><p style="font-size:13px;color:var(--text3)">
        ודא שקובץ <strong>videos.txt</strong> נמצא באותה תיקייה כמו index.html
      </p>
    </div>`;
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
