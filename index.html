<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #ffffff;
  --bg2:  #f9f9f9;
  --bg3:  #f1f1f1;
  --bg4:  #e0e0e0;

  --txt:  #0f0f0f;
  --txt2: #555555;
  --txt3: #888888;

  --red:  #ff0000;
  --blue: #065fd4;

  --like: #ff4e4e;
  --sw:   240px;
  --sc:   72px;
  --th:   56px;
  --ease: 0.2s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Rubik',sans-serif;overflow-x:hidden;min-height:100vh;}

/* ── TOPBAR ────────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--th);
  background:var(--bg);display:flex;align-items:center;
  padding:0 16px;gap:10px;z-index:200;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.tbtn{background:none;border:none;cursor:pointer;color:var(--txt);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--ease);}
.tbtn:hover{background:var(--bg3);}
.tbtn svg{width:22px;height:22px;fill:currentColor;}
#logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;}
.logo-badge{background:var(--red);border-radius:7px;width:32px;height:22px;display:flex;align-items:center;justify-content:center;transition:transform var(--ease);}
#logo:hover .logo-badge{transform:scale(1.08);}
.logo-badge svg{width:14px;height:14px;fill:#fff;}
.logo-txt{
  font-size:17px;
  font-weight:700;
  letter-spacing:-.5px;
  color: var(--red);
}
#search-area{flex:1;max-width:580px;display:flex;align-items:center;margin:0 auto;direction:ltr;}
#search-input{flex:1;background:var(--bg);border:1.5px solid var(--bg4);border-right:none;border-radius:24px 0 0 24px;padding:8px 16px;color:var(--txt);font-size:14px;font-family:'Rubik',sans-serif;outline:none;direction:rtl;transition:border-color var(--ease);}
#search-input:focus{border-color:var(--blue);}
#search-input::placeholder{color:var(--txt3);}
#search-btn{background:var(--bg3);border:1.5px solid var(--bg4);border-left:none;border-radius:0 24px 24px 0;padding:0 18px;height:38px;cursor:pointer;color:var(--txt);display:flex;align-items:center;transition:background var(--ease);}
#search-btn:hover{background:var(--bg4);}
#search-btn svg{width:18px;height:18px;fill:currentColor;}
.tb-r{display:flex;align-items:center;gap:6px;margin-inline-start:auto;flex-shrink:0;}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ffd93d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;}
.bell-wrap{position:relative;}
.notif-badge{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:var(--red);font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;color:#fff;pointer-events:none;border:2px solid var(--bg);}
.notif-badge.vis{display:flex;}

/* ── SIDEBAR ────────────────────────────────────────────── */
#sidebar{position:fixed;top:var(--th);right:0;width:var(--sw);height:calc(100vh - var(--th));background:var(--bg);overflow-y:auto;overflow-x:hidden;padding:8px 0 24px;z-index:100;transition:width var(--ease);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;}
#sidebar.col{width:var(--sc);}
#sidebar::-webkit-scrollbar{width:4px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
.sb-div{height:1px;background:rgba(255,255,255,0.07);margin:8px 0;}
.sb-label{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:8px 20px 4px;white-space:nowrap;overflow:hidden;transition:opacity var(--ease),height var(--ease),padding var(--ease);height:28px;}
#sidebar.col .sb-label{opacity:0;height:0;padding:0;}
.nitem{display:flex;align-items:center;height:40px;padding:0 20px;gap:20px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease),padding var(--ease),gap var(--ease);text-decoration:none;color:var(--txt);white-space:nowrap;overflow:hidden;}
.nitem:hover{background:var(--bg3);}
.nitem.on{background:var(--bg3);}
.nitem.on .ni{color:var(--red);}
.ni{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ni svg{width:22px;height:22px;fill:currentColor;}
.nl{font-size:13px;transition:opacity var(--ease);}
#sidebar.col .nl{
  display:none;
}	
#sidebar.col .nitem{padding:0;justify-content:center;gap:0;}

/* Channel mini in sidebar */
.chitem{display:flex;align-items:center;gap:10px;height:40px;padding:0 12px 0 8px;cursor:pointer;border-radius:10px;margin:2px 8px;transition:background var(--ease);color:var(--txt);white-space:nowrap;overflow:hidden;}
.chitem:hover{background:var(--bg3);}
.chdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;position:relative;}
.chdot .ndot{position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:none;}
.chdot.hn .ndot{display:block;}
.chname{font-size:13px;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
#sidebar.col .chitem{padding:0;justify-content:center;gap:0;}
#sidebar.col .chname{display:none;}
.ch-fb{background:none;border:1px solid var(--bg4);color:var(--txt3);border-radius:6px;font-size:10px;padding:2px 7px;cursor:pointer;font-family:'Rubik',sans-serif;transition:all var(--ease);flex-shrink:0;white-space:nowrap;}
.ch-fb:hover{border-color:var(--blue);color:var(--blue);}
.ch-fb.on{background:rgba(62,166,255,.2);border-color:var(--blue);color:var(--blue);font-weight:600;}
#sidebar.col .ch-fb{display:none;}

/* ── MAIN ── FIX: margin-inline-end for RTL sidebar-on-right */
#main{
  margin-top:var(--th);
  margin-right:var(--sw);
  padding:20px 28px;
  transition:margin-right var(--ease);
  min-height:calc(100vh - var(--th));
}
#main.col{
  margin-right:var(--sc);
}

/* Chips */
#chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:24px;scrollbar-width:none;direction:ltr;}
#chips::-webkit-scrollbar{display:none;}
.chip{background:var(--bg3);color:var(--txt);border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Rubik',sans-serif;transition:background var(--ease),transform .1s;}
.chip:hover{background:var(--bg4);transform:translateY(-1px);}
.chip.on{background:var(--txt);color:var(--bg);}

/* Sections */
.section{margin-bottom:40px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-size:17px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;}
.sec-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.sec-ico svg{width:16px;height:16px;fill:currentColor;}
.sec-all{font-size:13px;color:var(--blue);cursor:pointer;border:none;background:none;font-family:'Rubik',sans-serif;font-weight:500;transition:opacity var(--ease);}
.sec-all:hover{opacity:.7;}

/* Grids */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px 14px;}
.vgrid.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;flex-wrap:nowrap;}
.vgrid.row::-webkit-scrollbar{display:none;}
.vgrid.row .vcard{min-width:270px;max-width:270px;}

/* Card */
.vcard{cursor:pointer;transition:transform var(--ease);animation:fu .35s both;position:relative;}
.vcard:hover{transform:translateY(-3px);}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.vthumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:var(--bg3);}
.vthumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.vcard:hover .vthumb img{transform:scale(1.04);}
.vhover{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--ease);}
.vcard:hover .vhover{opacity:1;}
.pcircle{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;transform:scale(.8);transition:transform var(--ease);}
.vcard:hover .pcircle{transform:scale(1);}
.pcircle svg{width:22px;height:22px;fill:#111;margin-inline-start:3px;}
.vlbtn{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;z-index:5;transition:opacity var(--ease),transform var(--ease),background var(--ease);}
.vcard:hover .vlbtn,.vlbtn.on{opacity:1;}
.vlbtn:hover{transform:scale(1.15);background:rgba(0,0,0,.9);}
.vlbtn.on{background:rgba(255,78,78,.15);}
.vlbtn svg{width:16px;height:16px;fill:var(--txt3);transition:fill var(--ease);}
.vlbtn.on svg{fill:var(--like);}
.vinfo{display:flex;gap:10px;padding:10px 2px 0;}
.vav{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;}
.vav:hover{opacity:.75;}
.vtxt{flex:1;min-width:0;}
.vtitle{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--txt);margin-bottom:4px;cursor:pointer;}
.vtitle:hover{color:var(--blue);}
.vch{font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.vch svg{width:12px;height:12px;fill:currentColor;}
.vlabel{font-size:11px;color:var(--like);font-weight:500;display:flex;align-items:center;gap:3px;}
.vlabel svg{width:10px;height:10px;fill:var(--like);}

/* Skeleton */
.skel .vthumb{background:var(--bg3);}
.sl{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:4px;height:13px;margin:6px 0;}
.sl.s{width:55%;}
.sa{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-top:2px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shim 1.4s infinite;}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.eico{width:64px;height:64px;margin:0 auto 20px;opacity:.3;}
.eico svg{width:64px;height:64px;fill:currentColor;}
.empty h3{font-size:18px;color:var(--txt2);margin-bottom:8px;}
.empty p{font-size:14px;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);color:var(--txt);padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;border:1px solid var(--bg4);}
#toast.show{opacity:1;}

/* ── VIDEO MODAL ─────────────────────────────────────────── */
#vmodal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
#vmodal.open{display:flex;}
#vmodal-inner{background:var(--bg2);border-radius:14px;width:100%;max-width:900px;overflow:hidden;animation:mopen .25s cubic-bezier(.4,0,.2,1);position:relative;}
@keyframes mopen{from{transform:scale(.95);opacity:0;}to{transform:scale(1);opacity:1;}}
#vmodal-close{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.7);border:none;color:var(--txt);border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background var(--ease);}
#vmodal-close:hover{background:rgba(255,255,255,.15);}
#vmodal-close svg{width:20px;height:20px;fill:currentColor;}
#vmodal-player{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
#vmodal-player iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
#vmodal-info{padding:18px 20px 22px;direction:rtl;}
#vmodal-title{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:10px;}
#vmodal-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
#vmodal-channel{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt2);}
#vmodal-ch-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
#vmodal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.mod-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:none;color:var(--txt);border-radius:20px;padding:7px 14px;font-size:13px;font-family:'Rubik',sans-serif;cursor:pointer;transition:background var(--ease),color var(--ease);}
.mod-btn:hover{background:var(--bg4);}
.mod-btn svg{width:16px;height:16px;fill:currentColor;}
.mod-btn.liked{background:rgba(255,78,78,.15);color:var(--like);}
.mod-btn.followed{background:rgba(62,166,255,.15);color:var(--blue);}
#vmodal-divider{height:1px;background:rgba(255,255,255,.07);margin:12px 0;}
#vmodal-desc{font-size:13px;color:var(--txt2);line-height:1.7;max-height:100px;overflow:hidden;white-space:pre-line;transition:max-height .3s;}
#vmodal-desc.exp{max-height:400px;}
#vmodal-expand{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Rubik',sans-serif;margin-top:6px;padding:0;}

/* ── NOTIFICATIONS PANEL ─────────────────────────────────── */
#notif-panel{position:fixed;top:calc(var(--th) + 8px);left:16px;width:340px;background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-height:420px;overflow-y:auto;transform:translateY(-8px);}
#notif-panel.open{opacity:1;pointer-events:all;transform:translateY(0);}
.notif-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);}
.notif-hdr h3{font-size:14px;font-weight:600;}
.notif-clear{font-size:12px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:'Rubik',sans-serif;}
.notif-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:10px;cursor:pointer;transition:background var(--ease);direction:rtl;}
.notif-item:hover{background:var(--bg3);}
.notif-item.unread{border-inline-start:3px solid var(--red);}
.notif-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.notif-body{flex:1;min-width:0;}
.notif-txt{font-size:13px;line-height:1.4;margin-bottom:3px;}
.notif-time{font-size:11px;color:var(--txt3);}
.notif-empty{padding:30px;text-align:center;color:var(--txt3);font-size:13px;line-height:1.6;}

@media(max-width:760px){
  #sidebar{display:none;}
  #main{margin-inline-end:0!important;padding:16px 14px;}
  .vgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
  #search-area{max-width:none;}
  #vmodal-inner{max-width:100%;}
  #notif-panel{right:8px;left:8px;width:auto;}
}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <button class="tbtn" onclick="toggleSB()">
    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <a href="#" id="logo">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zm12-3c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2s10 4.48 10 10z"/></svg>
    </div>
    <span class="logo-txt">MyTube</span>
  </a>
  <div id="search-area">
    <input id="search-input" type="text" placeholder="חיפוש..." oninput="onSearch(this.value)">
    <button id="search-btn" onclick="onSearch(document.getElementById('search-input').value)">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>
  <div class="tb-r">
    <div class="bell-wrap">
      <button class="tbtn" id="bell-btn" onclick="toggleNotifPanel()" title="התראות">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
      <div class="notif-badge" id="notif-badge"></div>
    </div>
    <div class="avatar">מ</div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="nitem on" id="n-all" onclick="setSection('all',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></span>
    <span class="nl">דף הבית</span>
  </div>
  <div class="nitem" id="n-recommended" onclick="setSection('recommended',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
    <span class="nl">מומלצים</span>
  </div>
  <div class="nitem" id="n-liked" onclick="setSection('liked',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span>
    <span class="nl">אהבתי</span>
  </div>
  <div class="nitem" id="n-channels" onclick="setSection('channels',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg></span>
    <span class="nl">ערוצים</span>
  </div>
  <div class="nitem" id="n-following" onclick="setSection('following',this)">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></span>
    <span class="nl">עוקב אחרי</span>
  </div>
  <div class="sb-div"></div>
  <div class="sb-label">ערוצים שלך</div>
  <div id="sb-chs"></div>
  <div class="sb-div"></div>
  <div class="nitem" onclick="reload()">
    <span class="ni"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></span>
    <span class="nl">רענן</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="chips">
    <button class="chip on" onclick="chip(this,'all')">הכל</button>

            <span id="modal-like-txt">אהבתי</span>
          </button>
          <button class="mod-btn" id="modal-follow-btn" onclick="modalToggleFollow()">
            <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>

            <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>

<script>
// ═══════════════════ STATE ═══════════════════
const API_KEY = 'AIzaSyB-SYIw3diw_2RZFY6cfDPHOkzQN9aQ94E';
let vids     = [];
let chMap    = {};
let ready    = new Set();
let likes    = new Set(JSON.parse(localStorage.getItem('ml')||'[]'));
let followed = new Set(JSON.parse(localStorage.getItem('mf')||'[]'));
let sbOpen   = true;
let section  = 'all';
let q        = '';
let modalVid = null;
let notifications  = JSON.parse(localStorage.getItem('mn')||'[]');
let chLastVids     = JSON.parse(localStorage.getItem('mlv')||'{}');

const PAL = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#20c997','#f06595','#74c0fc'];
const HEART_FULL = 'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z';
const HEART_OUT  = 'M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z';

// ═══════════════════ BOOT ═══════════════════
window.addEventListener('DOMContentLoaded', () => {
searchYouTube();
  renderNotifs();
  updateBadge();
  setInterval(checkNewVids, 5 * 60 * 1000);
  // Close notif panel when clicking outside
  document.addEventListener('click', e => {
    const p = document.getElementById('notif-panel');
    const b = document.getElementById('bell-btn');
    if (p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target))
      p.classList.remove('open');
  });
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
});

// ═══════════════════ LOAD ═══════════════════
async function searchYouTube(query = 'חדשות') {
  showSkels();
  try {
    const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`);
    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    vids = data.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      channel: item.snippet.channelTitle,
      thumb: item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.medium.url,
      desc: item.snippet.description
    }));

    buildChMap();
    buildSBChannels();
    renderAll();
  } catch (e) {
    showErr("שגיאה בחיפוש: " + e.message);
  }
}

function buildChMap() {
  chMap = {};
  for (const v of vids) {
    if (!v.channel) continue;
    if (!chMap[v.channel]) chMap[v.channel] = [];
    chMap[v.channel].push(v.id);
  }
}

function buildChMap() {
  chMap = {};
  for (const v of vids) {
    if (!v.channel) continue;
    if (!chMap[v.channel]) chMap[v.channel] = [];
    chMap[v.channel].push(v.id);
  }
}

// פונקציה שמארגנת את הסרטונים לפי ערוצים
function buildChMap() {
  chMap = {};
  for (const v of vids) {
    if (!v.channel) continue;
    if (!chMap[v.channel]) chMap[v.channel] = [];
    chMap[v.channel].push(v.id);
  }
}

// ═══════════════════ FOLLOW & NOTIFICATIONS ═══════════════════
function toggleFollow(ch) {
  if (followed.has(ch)) {
    followed.delete(ch);
    toast('הפסקת לעקוב אחרי ' + ch);
  } else {
    followed.add(ch);
    toast('עוקב עכשיו אחרי ' + ch + ' 🔔');
    if (chMap[ch] && !chLastVids[ch]) {
      chLastVids[ch] = [...chMap[ch]];
      localStorage.setItem('mlv', JSON.stringify(chLastVids));
    }
  }
  localStorage.setItem('mf', JSON.stringify([...followed]));
  buildSBChannels(); renderAll();
  if (modalVid) updateModalFollow();
}

function saveSnapshots() {
  for (const ch of followed) {
    if (chMap[ch] && !chLastVids[ch]) {
      chLastVids[ch] = [...chMap[ch]];
    }
  }
  localStorage.setItem('mlv', JSON.stringify(chLastVids));
}

function checkNewVids() {
  let found = 0;
  for (const ch of followed) {
    const cur  = chMap[ch]||[];
    const last = chLastVids[ch]||[];
    const newIds = cur.filter(id => !last.includes(id));
    for (const id of newIds) {
      const v = vids.find(x=>x.id===id);
      addNotif(ch, v ? (v.title||'סרטון חדש') : 'סרטון חדש', id);
      found++;
    }
    if (newIds.length) chLastVids[ch] = [...cur];
  }
  if (found) {
    localStorage.setItem('mlv', JSON.stringify(chLastVids));
    renderNotifs(); updateBadge();
  }
}

function addNotif(channel, title, vidId) {
  notifications.unshift({id: Date.now()+Math.random(), channel, title, vidId, time: new Date().toISOString(), read: false});
  if (notifications.length > 50) notifications = notifications.slice(0,50);
  localStorage.setItem('mn', JSON.stringify(notifications));
}

function renderNotifs() {
  const list = document.getElementById('notif-list');
  if (!list) return;
  list.innerHTML = '';
  if (!notifications.length) {
    list.innerHTML = '<div class="notif-empty">אין התראות עדיין<br><br>עקוב אחרי ערוץ כדי לקבל התראות כשמועלים סרטונים חדשים.</div>';
    return;
  }
  for (const n of notifications) {
    const col = PAL[Math.abs(hsh(n.channel||'')) % PAL.length];
    const el = document.createElement('div');
    el.className = 'notif-item' + (n.read ? '' : ' unread');
    el.innerHTML = `
      <div class="notif-av" style="background:${col}22;color:${col}">${(n.channel||'?').slice(0,2).toUpperCase()}</div>
      <div class="notif-body">
        <div class="notif-txt"><strong>${x(n.channel)}</strong>: ${x(n.title)}</div>
        <div class="notif-time">${fmtTime(n.time)}</div>
      </div>`;
    el.onclick = () => {
      n.read = true;
      localStorage.setItem('mn', JSON.stringify(notifications));
      updateBadge(); renderNotifs();
      const v = vids.find(vv=>vv.id===n.vidId);
      if (v) { document.getElementById('notif-panel').classList.remove('open'); openModal(v); }
    };
    list.appendChild(el);
  }
}

function clearNotifs() {
  notifications.forEach(n => n.read = true);
  localStorage.setItem('mn', JSON.stringify(notifications));
  updateBadge(); renderNotifs();
}

function updateBadge() {
  const b = document.getElementById('notif-badge');
  if (!b) return;
  const u = notifications.filter(n=>!n.read).length;
  b.textContent = u > 9 ? '9+' : u;
  b.classList.toggle('vis', u > 0);
}

function toggleNotifPanel() {
  document.getElementById('notif-panel').classList.toggle('open');
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = Date.now() - new Date(iso).getTime();
  if (d < 60000) return 'עכשיו';
  if (d < 3600000) return `לפני ${Math.floor(d/60000)} דק'`;
  if (d < 86400000) return `לפני ${Math.floor(d/3600000)} שע'`;
  return `לפני ${Math.floor(d/86400000)} ימים`;
}



// ═══════════════════ VIDEO MODAL ═══════════════════
function openModal(v) {
  modalVid = v;
  // התיקון כאן: הוספנו את האות v לפני ה-id
  const embedUrl = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&enablejsapi=1&origin=${window.location.protocol}//${window.location.host}`;
  document.getElementById('vmodal-player').innerHTML = 
    `<iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  document.getElementById('vmodal-title').textContent = v.title||'סרטון YouTube';

  const col = PAL[Math.abs(hsh(v.channel||'')) % PAL.length];
  const av  = document.getElementById('vmodal-ch-av');
  av.style.background = col + '22'; av.style.color = col;
  av.textContent = (v.channel||'?').slice(0,2).toUpperCase();
  document.getElementById('vmodal-ch-name').textContent = v.channel||'ערוץ';

  updateModalLike(); updateModalFollow();

  const descEl = document.getElementById('vmodal-desc');
  descEl.classList.remove('exp');
  document.getElementById('vmodal-expand').textContent = 'הצג יותר ▼';
  if (v.desc) { descEl.textContent = v.desc; }
  else {
    descEl.textContent = 'טוען תיאור...';
    fetchDesc(v).then(d => { v.desc = d; if (modalVid && modalVid.id===v.id) descEl.textContent = d; });
  }

  document.getElementById('vmodal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
async function fetchDesc(v) {
  try {
    const r = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${v.id}`);
    if (r.ok) { const d = await r.json(); if (d.description) return d.description; }
  } catch {}
  return `סרטון מאת ${v.channel||'ערוץ YouTube'}.\nלתיאור המלא, פתח את הסרטון ביוטיוב.`;
}

function closeModal() {
  document.getElementById('vmodal').classList.remove('open');
  document.getElementById('vmodal-player').innerHTML = '';
  document.body.style.overflow = '';
  modalVid = null;
}

function handleModalBg(e) { if (e.target.id==='vmodal') closeModal(); }
function openYT() { if (modalVid) window.open(`https://www.youtube.com/watch?v=${modalVid.id}`, '_blank'); }

function toggleDesc() {
  const el  = document.getElementById('vmodal-desc');
  const btn = document.getElementById('vmodal-expand');
  const exp = el.classList.toggle('exp');
  btn.textContent = exp ? 'הצג פחות ▲' : 'הצג יותר ▼';
}

function modalToggleLike() {
  if (!modalVid) return;
  const id = modalVid.id;
  if (likes.has(id)) { likes.delete(id); toast('הוסר מאהבתי'); }
  else { likes.add(id); toast('נוסף לאהבתי ❤️'); }
  localStorage.setItem('ml', JSON.stringify([...likes]));
  updateModalLike();
  // update card if visible
  const btn = document.querySelector(`.vlbtn[data-id="${id}"]`);
  if (btn) {
    btn.classList.toggle('on', likes.has(id));
    btn.querySelector('path').setAttribute('d', likes.has(id) ? HEART_FULL : HEART_OUT);
  }
  setTimeout(renderAll, 80);
}

function updateModalLike() {
  if (!modalVid) return;
  const liked = likes.has(modalVid.id);
  document.getElementById('modal-like-btn').classList.toggle('liked', liked);
  document.getElementById('modal-heart').setAttribute('d', liked ? HEART_FULL : HEART_OUT);
  document.getElementById('modal-like-txt').textContent = liked ? 'הסר מאהבתי' : 'אהבתי';
}

function modalToggleFollow() {
  if (!modalVid?.channel) return;
  toggleFollow(modalVid.channel);
}

function updateModalFollow() {
  if (!modalVid) return;
  const isF = followed.has(modalVid.channel);
  document.getElementById('modal-follow-btn').classList.toggle('followed', isF);
  document.getElementById('modal-follow-txt').textContent = isF ? 'מפסיק לעקוב 🔕' : 'עקוב אחרי הערוץ 🔔';
}

// ═══════════════════ RECOMMENDATIONS ═══════════════════
function getRec() {
  const chs = Object.keys(chMap);
  if (!chs.length) return vids.slice(0,12).map(v=>v.id);
  const picks = chs.map(ch => chMap[ch][0]);
  for (const ch of chs)
    for (const id of chMap[ch].slice(1)) {
      if (!picks.includes(id)) picks.push(id);
      if (picks.length>=12) break;
    }
  return picks.slice(0,12);
}

// ═══════════════════ RENDER ═══════════════════
function renderAll() {
  const ct = document.getElementById('content');
  ct.innerHTML = '';
  const filt = q ? vids.filter(v => (v.title||'').toLowerCase().includes(q)||(v.channel||'').toLowerCase().includes(q)) : null;

  if (section==='all'||section==='recommended') {
    const d = (filt ? getRec().map(id=>vids.find(v=>v.id===id)).filter(Boolean).filter(v=>filt.includes(v))
                    : getRec().map(id=>vids.find(v=>v.id===id)).filter(Boolean));
    if (d.length) ct.appendChild(mkSec('מומלצים', d,
      '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>',
      '#ffd93d', d.length>4));
  }

  if (section==='all'||section==='liked') {
    const lv = vids.filter(v=>likes.has(v.id));
    const d  = filt ? lv.filter(v=>filt.includes(v)) : lv;
    if (d.length) ct.appendChild(mkSec('אהבתי', d,
      '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>',
      '#ff6b6b', d.length>4));
  }

  if (section==='following') {
    if (!followed.size) {
      ct.appendChild(mkEmpty('לא עוקב אחרי ערוצים', 'פתח סרטון ולחץ "עקוב אחרי הערוץ" כדי לקבל התראות'));
    } else {
      let shown = 0;
      for (const ch of followed) {
        const cv = (chMap[ch]||[]).map(id=>vids.find(v=>v.id===id)).filter(Boolean);
        const d  = filt ? cv.filter(v=>filt.includes(v)) : cv;
        if (!d.length) continue;
        const c = PAL[Math.abs(hsh(ch)) % PAL.length];
        ct.appendChild(mkSec(ch + ' 🔔', d,
          '<path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>',
          c, d.length>4));
        shown++;
      }
      if (!shown) ct.appendChild(mkEmpty('לא נמצאו סרטונים', ''));
    }
  }

  if (section==='all'||section==='channels') {
    for (const [ch, ids] of Object.entries(chMap)) {
      const cv = ids.map(id=>vids.find(v=>v.id===id)).filter(Boolean);
      const d  = filt ? cv.filter(v=>filt.includes(v)) : cv;
      if (!d.length) continue;
      const c = PAL[Math.abs(hsh(ch)) % PAL.length];
      ct.appendChild(mkSec(ch, d,
        '<path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/>',
        c, d.length>4));
    }
  }

  if (!ct.children.length)
    ct.appendChild(section==='liked'
      ? mkEmpty('עדיין לא אהבת סרטונים', 'לחץ על הלב בכרטיסיית סרטון')
      : mkEmpty('לא נמצאו סרטונים', q ? 'נסה מילת חיפוש אחרת' : 'בדוק את videos.txt'));
}

function mkSec(title, vs, icoPath, color, scrollable) {
  const s = document.createElement('div'); s.className = 'section';
  const hdr = document.createElement('div'); hdr.className = 'sec-hdr';
  hdr.innerHTML = `
    <div class="sec-title">
      <div class="sec-ico" style="background:${color}22;color:${color}"><svg viewBox="0 0 24 24">${icoPath}</svg></div>
      ${x(title)}
    </div>
    ${vs.length>4 ? `<button class="sec-all">${vs.length} סרטונים</button>` : ''}`;
  s.appendChild(hdr);
  const g = document.createElement('div');
  g.className = 'vgrid' + (scrollable ? ' row' : '');
  vs.forEach((v,i) => g.appendChild(mkCard(v, i*45)));
  s.appendChild(g);
  return s;
}

function mkCard(v, delay) {
  const el = document.createElement('div');
  el.className = 'vcard' + (v.title ? '' : ' skel');
  el.style.animationDelay = delay + 'ms';
  if (!v.title) {
    el.innerHTML = `<div class="vthumb"></div><div class="vinfo"><div class="sa"></div><div class="vtxt"><div class="sl"></div><div class="sl s"></div></div></div>`;
    return el;
  }
  const col  = PAL[Math.abs(hsh(v.channel||'')) % PAL.length];
  const init = (v.channel||'?').slice(0,2).toUpperCase();
  const liked = likes.has(v.id);
  const isF   = followed.has(v.channel||'');

  el.innerHTML = `
    <div class="vthumb">
      <img src="${v.thumb}" alt="${x(v.title)}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${v.id}/default.jpg'">
      <div class="vhover"><div class="pcircle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      <button class="vlbtn${liked?' on':''}" data-id="${v.id}" title="${liked?'הסר לייק':'אהבתי'}">
        <svg viewBox="0 0 24 24"><path d="${liked?HEART_FULL:HEART_OUT}"/></svg>
      </button>
    </div>
    <div class="vinfo">
      <div class="vav" style="background:${col}22;color:${col}" title="${x(v.channel)}">${init}</div>
      <div class="vtxt">
        <div class="vtitle">${x(v.title)}</div>
        <div class="vch">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
          ${x(v.channel)}${isF ? ' 🔔' : ''}
        </div>
        ${liked ? `<div class="vlabel"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>אהבתי</div>` : ''}
      </div>
    </div>`;

  el.querySelector('.vthumb').addEventListener('click', e => { if(e.target.closest('.vlbtn')) return; openModal(v); });
  el.querySelector('.vtitle').addEventListener('click', () => openModal(v));
  el.querySelector('.vlbtn').addEventListener('click', e => { e.stopPropagation(); toggleLike(v.id, el.querySelector('.vlbtn')); });
  el.querySelector('.vav').addEventListener('click', e => { e.stopPropagation(); filterChannel(v.channel); });
  return el;
}

function filterChannel(ch) {
  section = 'channels';
  q = (ch||'').toLowerCase();
  document.getElementById('search-input').value = ch||'';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));
  const n = document.getElementById('n-channels');
  if (n) n.classList.add('on');
  renderAll();
}

function mkEmpty(t,s) {
  const d=document.createElement('div'); d.className='empty';
  d.innerHTML=`<div class="eico"><svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg></div><h3>${x(t)}</h3><p>${x(s)}</p>`;
  return d;
}

function showSkels() {
  const ct=document.getElementById('content'); ct.innerHTML='';
  const g=document.createElement('div'); g.className='vgrid';
  for(let i=0;i<8;i++) g.appendChild(mkCard({id:'_'+i,title:null},i*30));
  ct.appendChild(g);
}

function showErr(msg) {
  document.getElementById('content').innerHTML=`
    <div class="empty"><div class="eico"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
    <h3>שגיאה בטעינה</h3><p>${x(msg)}</p>
   <p style="margin-top:10px;font-size:13px;color:var(--txt3)">בדוק את חיבור האינטרנט או את תקינות מפתח ה-API</p></div>`;
}

// ═══════════════════ SIDEBAR CHANNELS ═══════════════════
function buildSBChannels() {
  const w = document.getElementById('sb-chs'); w.innerHTML='';
  Object.keys(chMap).forEach((ch,i) => {
    const c   = PAL[i%PAL.length];
    const isF = followed.has(ch);
    const hasNew = notifications.some(n => !n.read && n.channel===ch);
    const el  = document.createElement('div'); el.className='chitem';
    el.innerHTML=`
      <div class="chdot${hasNew?' hn':''}" style="background:${c}22;color:${c}">
        ${ch.slice(0,2).toUpperCase()}<span class="ndot"></span>
      </div>
      <span class="chname">${x(ch)}</span>
      <button class="ch-fb${isF?' on':''}">${isF ? '🔔 עוקב' : '+ עקוב'}</button>`;
    el.querySelector('.chname').onclick = () => filterChannel(ch);
    el.querySelector('.chdot').onclick  = () => filterChannel(ch);
    el.querySelector('.ch-fb').onclick  = e => { e.stopPropagation(); toggleFollow(ch); };
    w.appendChild(el);
  });
}

// ═══════════════════ LIKES ═══════════════════
function toggleLike(id, btn) {
  if (likes.has(id)) { likes.delete(id); btn.classList.remove('on'); btn.querySelector('path').setAttribute('d', HEART_OUT); toast('הוסר מאהבתי'); }
  else { likes.add(id); btn.classList.add('on'); btn.querySelector('path').setAttribute('d', HEART_FULL); toast('נוסף לאהבתי ❤️'); }
  localStorage.setItem('ml', JSON.stringify([...likes]));
  if (modalVid && modalVid.id===id) updateModalLike();
  setTimeout(renderAll, 80);
}

// ═══════════════════ NAV ═══════════════════
function setSection(sec, el) {
  section = sec;
  document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));
  el.classList.add('on'); syncChips(sec); renderAll();
}

function chip(btn, sec) {
  section = sec;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.nitem').forEach(n=>n.classList.remove('on'));
  const n = document.getElementById('n-'+sec);
  if (n) n.classList.add('on');
  renderAll();
}

function syncChips(sec) {
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('on', (c.getAttribute('onclick')||'').includes(`'${sec}'`));
  });
}

function toggleSB() {
  sbOpen = !sbOpen;
  document.getElementById('sidebar').classList.toggle('col', !sbOpen);
  document.getElementById('main').classList.toggle('col', !sbOpen);
}

// פונקציה שמופעלת כשלוחצים על זכוכית המגדלת או מקלידים
function onSearch(v) {
  q = v.trim();
  if (q.length > 2) {
    searchYouTube(q); // מבצע חיפוש אמיתי ביוטיוב
  }
}

function reload() {
  vids=[]; chMap={}; ready=new Set(); section='all';
showSkels(); searchYouTube(); toast('מרענן...');
}

// ═══════════════════ UTILS ═══════════════════
function hsh(s){let r=0;for(let i=0;i<s.length;i++)r=((r<<5)-r)+s.charCodeAt(i)|0;return r;}
function x(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let _t;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>t.classList.remove('show'),2600);}
</script>
</body>
</html>
